<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Face</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="controls">
        <div class="control-group">
            <label>Mouth:</label>
            <input type="range" id="mouthSlider" min="0" max="1" step="0.1" value="0">
            <span id="mouthValue">Closed</span>
        </div>
        <div class="control-group">
            <label>Head Rotation:</label>
            <input type="range" id="headSlider" min="-1" max="1" step="0.1" value="0">
            <span id="headValue">Center</span>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="face.js"></script>
    <script src="main.js"></script>
</body>
</html>
